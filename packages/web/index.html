<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
        <title>Shoppingo</title>
        <link rel="icon" type="image/png" href="/logo-192.png" />
        <meta name="theme-color" content="#2e7d32" />

        <link rel="dns-prefetch" href="//fonts.googleapis.com" />

        <script>
            (function() {
                try {
                    const storedTheme = localStorage.getItem('theme');
                    const theme = storedTheme && (storedTheme === 'light' || storedTheme === 'dark')
                        ? storedTheme
                        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                    document.documentElement.classList.add(theme);
                    // Set background color directly
                    const bgColor = theme === 'dark' ? '#1a1a1a' : 'oklch(0.96 0.015 80)';
                    document.documentElement.style.setProperty('--initial-bg', bgColor);
                } catch (e) {
                    // Fallback if localStorage fails
                    const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    document.documentElement.classList.add(theme);
                    const bgColor = theme === 'dark' ? '#1a1a1a' : 'oklch(0.96 0.015 80)';
                    document.documentElement.style.setProperty('--initial-bg', bgColor);
                }
            })();
        </script>
        
        <style>
            body {
                margin: 0;
                padding: 0;
            }
            html {
                background-color: var(--initial-bg, oklch(0.96 0.015 80));
            }
            #root {
                min-height: 100vh;
                background-color: var(--initial-bg, oklch(0.96 0.015 80));
            }
            html.dark #root {
                background-color: #1a1a1a;
            }
            .loading-screen {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background-color: var(--initial-bg, oklch(0.96 0.015 80));
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            }
            html.dark .loading-screen {
                background-color: #1a1a1a;
            }
            .loading-spinner {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                border: 8px solid #d1914b;
                box-sizing: border-box;
                --c: no-repeat radial-gradient(farthest-side, #d64123 94%, #0000);
                --b: no-repeat radial-gradient(farthest-side, #000 94%, #0000);
                background:
                    var(--c) 11px 15px,
                    var(--b) 6px 15px,
                    var(--c) 35px 23px,
                    var(--b) 29px 15px,
                    var(--c) 11px 46px,
                    var(--b) 11px 34px,
                    var(--c) 36px 0px,
                    var(--b) 50px 31px,
                    var(--c) 47px 43px,
                    var(--b) 31px 48px,
                    #f6d353;
                background-size:
                    15px 15px,
                    6px 6px;
                animation: pizza-spin 3s infinite;
                margin-bottom: 16px;
            }
            @keyframes pizza-spin {
                0% {
                    -webkit-mask: conic-gradient(#0000 0, #000 0);
                    mask: conic-gradient(#0000 0, #000 0);
                }
                16.67% {
                    -webkit-mask: conic-gradient(#0000 60deg, #000 0);
                    mask: conic-gradient(#0000 60deg, #000 0);
                }
                33.33% {
                    -webkit-mask: conic-gradient(#0000 120deg, #000 0);
                    mask: conic-gradient(#0000 120deg, #000 0);
                }
                50% {
                    -webkit-mask: conic-gradient(#0000 180deg, #000 0);
                    mask: conic-gradient(#0000 180deg, #000 0);
                }
                66.67% {
                    -webkit-mask: conic-gradient(#0000 240deg, #000 0);
                    mask: conic-gradient(#0000 240deg, #000 0);
                }
                83.33% {
                    -webkit-mask: conic-gradient(#0000 300deg, #000 0);
                    mask: conic-gradient(#0000 300deg, #000 0);
                }
                100% {
                    -webkit-mask: conic-gradient(#0000 360deg, #000 0);
                    mask: conic-gradient(#0000 360deg, #000 0);
                }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div class="loading-screen">
                <div class="loading-spinner"></div>
            </div>
        </div>
        <script type="module" src="/src/index.tsx"></script>
    </body>
</html>
