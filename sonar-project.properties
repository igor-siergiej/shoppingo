sonar.projectKey=shoppingo
sonar.projectName=Shoppingo
sonar.projectVersion=1.0

# Source and test files
sonar.sources=packages/api/src,packages/web/src
sonar.tests=packages/api/src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Exclusions
sonar.exclusions=node_modules/**,**/dist/**,**/build/**,**/coverage/**
sonar.javascript.exclusions=**/node_modules/**,**/*.d.ts,**/*.config.ts

# Coverage reports
sonar.javascript.lcov.reportPaths=packages/api/coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/test-utils.ts,**/*.config.ts
