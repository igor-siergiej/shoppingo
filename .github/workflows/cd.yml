name: CD

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    env:
      # Skip husky hook install; semantic-release's git push must not trigger the local pre-push audit.
      HUSKY: 0
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  build-publish:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: git pull origin main
      - run: git submodule update --init --recursive
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Publish Docker images
        run: bash .github/workflows-utils/pipelines/scripts/publish-images.sh shoppingo ${{ steps.version.outputs.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-publish
    steps:
      - name: Trigger web deployment
        run: |
          curl -X POST --fail-with-body \
            -H "Content-Type: application/json" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n" \
            "${{ secrets.DEPLOY_WEB_URL }}" \
            -d '{"event":"deployment","timestamp":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'","ref":"'"$GITHUB_REF"'"}'
      - name: Trigger API deployment
        run: |
          curl -X POST --fail-with-body \
            -H "Content-Type: application/json" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n" \
            "${{ secrets.DEPLOY_API_URL }}" \
            -d '{"event":"deployment","timestamp":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'","ref":"'"$GITHUB_REF"'"}'
