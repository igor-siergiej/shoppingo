name: Build & Publish Docker

on:
  push:
    tags:
      - 'v*'

jobs:
  build-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract repo name
        id: repo-name
        run: echo "repo=$(basename ${{ github.repository }})" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./packages/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.repo-name.outputs.repo }}-${{ matrix.service }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.repo-name.outputs.repo }}-${{ matrix.service }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          args: |
            APP_VERSION=${{ steps.version.outputs.version }}

      - name: Image digest
        run: |
          echo "Published image: ghcr.io/${{ github.repository_owner }}/${{ steps.repo-name.outputs.repo }}-${{ matrix.service }}:${{ steps.version.outputs.version }}"
