name: PR

on:
  pull_request:
    branches: '*'

# Cancel superseded runs when new commits are pushed to the same PR.
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: bun run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: bun run tsc --noEmit
      - run: bun run --filter @shoppingo/api test --coverage
      - run: bun run --filter @shoppingo/web test
      - name: Check coverage threshold (90%)
        run: |
          COVERAGE=$(cat packages/api/coverage/coverage-summary.json | grep -o '"lines"[^}]*}' | grep -o '[0-9.]*' | head -1)
          echo "Code coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets 90% threshold"

  e2e:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: read
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: devuser
          MONGO_INITDB_ROOT_PASSWORD: devpassword
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Blocking merge gate: dead code only. Fast (~1.5m). Run the analyzer
  # directly via bunx — the fallow action hangs on a second invocation — and
  # whole-repo (not PR-scoped) so reachability resolves against the full graph;
  # PR-scoped discovery false-positives exports whose only consumer is an
  # unchanged file. Non-zero exit on any unused code fails the job. The slow
  # informational `fallow audit` (complexity/duplication via PR comments) was
  # dropped — run `bunx fallow audit` locally for that report.
  fallow-deadcode:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bunx fallow@2.100.0 dead-code

  semgrep:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [test, e2e]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: true
          config: >-
            p/security-audit
            p/typescript
            p/owasp-top-ten
      - uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
