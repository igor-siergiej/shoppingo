name: CI/CD

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn tsc --noEmit
      - run: |
          echo "🧪 Running tests for packages..."
          if [ -f "yarn.lock" ] && grep -q '"workspaces":' package.json 2>/dev/null; then
            echo "📦 Detected monorepo structure"
            if [ -d "packages" ]; then
              for package_dir in packages/*/; do
                package_dir=${package_dir%/}
                if [ -f "${package_dir}/package.json" ]; then
                  package_name=$(node -p "require('./${package_dir}/package.json').name" 2>/dev/null || echo "")
                  if [ -n "$package_name" ]; then
                    if grep -q '"test":' "${package_dir}/package.json"; then
                      echo "✅ Running tests for $package_name..."
                      yarn workspace "$package_name" test
                    fi
                  fi
                fi
              done
            fi
          fi

  build-publish:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        name: Build & push api
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            igurusama/imapps:shoppingo-api-${{ steps.version.outputs.version }}
            igurusama/imapps:shoppingo-api-latest
          platforms: linux/amd64,linux/arm64
          build-args: NODE_AUTH_TOKEN=${{ secrets.GH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v6
        name: Build & push web
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            igurusama/imapps:shoppingo-web-${{ steps.version.outputs.version }}
            igurusama/imapps:shoppingo-web-latest
          platforms: linux/amd64,linux/arm64
          build-args: NODE_AUTH_TOKEN=${{ secrets.GH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: [test, build-publish]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
