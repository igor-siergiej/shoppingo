name: CI/CD

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: yarn tsc --noEmit
      - run: |
          echo "🧪 Running tests for packages..."
          if [ -f "yarn.lock" ] && grep -q '"workspaces":' package.json 2>/dev/null; then
            echo "📦 Detected monorepo structure"
            if [ -d "packages" ]; then
              for package_dir in packages/*/; do
                package_dir=${package_dir%/}
                if [ -f "${package_dir}/package.json" ]; then
                  package_name=$(node -p "require('./${package_dir}/package.json').name" 2>/dev/null || echo "")
                  if [ -n "$package_name" ]; then
                    if grep -q '"test":' "${package_dir}/package.json"; then
                      echo "✅ Running tests for $package_name..."
                      yarn workspace "$package_name" test
                    fi
                  fi
                fi
              done
            fi
          fi

  build-publish:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git pull origin main
      - run: git submodule update --init --recursive
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Publish Docker images
        run: .github/workflows-utils/pipelines/scripts/publish-images.sh shoppingo ${{ steps.version.outputs.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
