# GitLab CI configuration for Shoppingo
include:
  - project: 'imapps/utils'
    file: 'templates.yml'

variables:
  PROJECT_NAME: "shoppingo"

# CI job - extends the reusable template
ci:
  extends: .ci-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

# Version release - bump version and create tag after successful builds
version-release:
  extends: .version-release-monorepo-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci
    - build-web
    - build-api

# Build shoppingo-web Docker image (test build with SHA tag)
build-web:
  extends: .docker-build-template
  variables:
    APP_NAME: "shoppingo-web"
    DOCKERFILE_PATH: "packages/web/Dockerfile"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci

# Build shoppingo-api Docker image (test build with SHA tag)
build-api:
  extends: .docker-build-template
  variables:
    APP_NAME: "shoppingo-api"
    DOCKERFILE_PATH: "packages/api/Dockerfile"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci

# Build and publish shoppingo-web with semantic version
publish-web:
  extends: .docker-publish-rebuild-template
  variables:
    APP_NAME: "shoppingo-web"
    DOCKERFILE_PATH: "packages/web/Dockerfile"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - job: version-release
      artifacts: true

# Build and publish shoppingo-api with semantic version
publish-api:
  extends: .docker-publish-rebuild-template
  variables:
    APP_NAME: "shoppingo-api"
    DOCKERFILE_PATH: "packages/api/Dockerfile"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - job: version-release
      artifacts: true

# Update staging environment automatically
gitops-staging:
  extends: .gitops-staging-template
  variables:
    APP_IMAGES: "shoppingo-api:shoppingo-api,shoppingo-web:shoppingo-web"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - version-release
    - publish-web
    - publish-api

# Manual production deployment
gitops-production:
  extends: .production-deploy-template
  variables:
    APP_IMAGES: "shoppingo-api:shoppingo-api,shoppingo-web:shoppingo-web"
  needs:
    - version-release
    - gitops-staging
