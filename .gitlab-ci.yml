# GitLab CI configuration for Shoppingo
include:
  - project: 'imapps/utils'
    file: 'templates.yml'

variables:
  PROJECT_NAME: "shoppingo"

# CI job - extends the reusable template
ci:
  extends: .ci-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

# Calculate semantic version for this release
version-calculation:
  extends: .version-calculation-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci

# Build shoppingo-web Docker image
build-web:
  extends: .docker-build-template
  variables:
    APP_NAME: "shoppingo-web"
    DOCKERFILE_PATH: "packages/web/Dockerfile"
    BUILD_ARGS: "--build-arg APP_VERSION=${VERSION}"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci
    - version-calculation

# Build shoppingo-api Docker image
build-api:
  extends: .docker-build-template
  variables:
    APP_NAME: "shoppingo-api"
    DOCKERFILE_PATH: "packages/api/Dockerfile"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci
    - version-calculation

# Update staging environment automatically
gitops-staging:
  extends: .gitops-staging-template
  variables:
    APP_IMAGES: "shoppingo-api:shoppingo-api,shoppingo-web:shoppingo-web"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - version-calculation
    - build-web
    - build-api

# Manual production deployment
gitops-production:
  extends: .production-deploy-template
  variables:
    APP_IMAGES: "shoppingo-api:shoppingo-api,shoppingo-web:shoppingo-web"
  needs:
    - version-calculation
    - gitops-staging
